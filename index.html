<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mailvix</title>
<style>
  :root{
    --ink:#12181F;
    --paper:#F6F3EC;
    --stamp:#FFC933;
    --line:#2A3543;
    --muted:#8A93A0;
    --ok:#4CD07D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Courier New', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px;
  }
  .header{
    text-align:center;
    margin-bottom:32px;
  }
  .header h1{
    font-size:28px;
    letter-spacing:2px;
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .stamp{
    display:inline-block;
    background:var(--stamp);
    color:var(--ink);
    padding:2px 8px;
    border-radius:4px;
    transform:rotate(-3deg);
    font-size:14px;
    font-weight:bold;
  }
  .card{
    background:#1A2230;
    border:1px solid var(--line);
    border-radius:8px;
    padding:20px;
    width:100%;
    max-width:520px;
    margin-bottom:16px;
  }
  .email-row{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .email-box{
    flex:1;
    background:var(--ink);
    border:1px dashed var(--line);
    border-radius:6px;
    padding:12px;
    font-size:15px;
    overflow-wrap:break-word;
    color:var(--stamp);
  }
  button{
    cursor:pointer;
    border:none;
    border-radius:6px;
    padding:12px 16px;
    font-family:inherit;
    font-weight:bold;
    font-size:14px;
    transition:opacity .15s;
  }
  button:hover{opacity:.85;}
  .btn-copy{background:var(--stamp); color:var(--ink);}
  .btn-new{background:var(--line); color:var(--paper); width:100%; margin-top:12px;}
  .inbox-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:1px;
  }
  .status-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--ok);
    display:inline-block;
    animation:pulse 1.5s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.3;}
  }
  .msg{
    border-bottom:1px solid var(--line);
    padding:12px 4px;
    cursor:pointer;
  }
  .msg:hover{background:#212B3B;}
  .msg-from{font-weight:bold; font-size:14px;}
  .msg-subject{font-size:13px; color:var(--muted); margin-top:2px;}
  .empty{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:24px 0;
  }
  .modal{
    position:fixed; inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .modal.show{display:flex;}
  .modal-content{
    background:var(--paper);
    color:var(--ink);
    border-radius:8px;
    padding:20px;
    max-width:520px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
  }
  .modal-content h3{margin-bottom:8px;}
  .modal-close{
    background:var(--ink); color:var(--paper);
    margin-top:12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Mailvix <span class="stamp">TEMP</span></h1>
</div>

<div class="card">
  <div class="email-row">
    <div class="email-box" id="emailAddr">Generating...</div>
    <button class="btn-copy" id="copyBtn">Copy</button>
  </div>
  <button class="btn-new" id="newBtn">Generate New Email</button>
</div>

<div class="card" style="max-width:520px;">
  <div class="inbox-title">
    <span><span class="status-dot"></span> Inbox</span>
    <span id="msgCount">0 messages</span>
  </div>
  <div id="inbox">
    <div class="empty">No messages yet... waiting for inbox</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalSubject"></h3>
    <div style="font-size:13px; color:#555; margin-bottom:12px;" id="modalFrom"></div>
    <div id="modalBody"></div>
    <button class="modal-close" id="closeModal">Close</button>
  </div>
</div>

<script>
// Update this URL after deploying the backend
const API = "http://localhost:3000/api";

let token = null;
let pollInterval = null;

async function createEmail(){
  document.getElementById("emailAddr").textContent = "Generating...";
  document.getElementById("inbox").innerHTML = '<div class="empty">No messages yet... waiting for inbox</div>';
  document.getElementById("msgCount").textContent = "0 messages";

  const res = await fetch(`${API}/create`, { method:"POST" });
  const data = await res.json();
  token = data.token;
  document.getElementById("emailAddr").textContent = data.address;

  clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 5000);
  loadMessages();
}

async function loadMessages(){
  if(!token) return;
  const res = await fetch(`${API}/messages`, {
    headers:{ Authorization: "Bearer " + token }
  });
  const messages = await res.json();
  const inbox = document.getElementById("inbox");
  document.getElementById("msgCount").textContent = messages.length + " messages";

  if(messages.length === 0){
    inbox.innerHTML = '<div class="empty">No messages yet... waiting for inbox</div>';
    return;
  }

  inbox.innerHTML = "";
  messages.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `
      <div class="msg-from">${m.from?.address || "Unknown sender"}</div>
      <div class="msg-subject">${m.subject || "(No subject)"}</div>
    `;
    div.onclick = () => openMessage(m.id);
    inbox.appendChild(div);
  });
}

async function openMessage(id){
  const res = await fetch(`${API}/messages/${id}`, {
    headers:{ Authorization: "Bearer " + token }
  });
  const msg = await res.json();
  document.getElementById("modalSubject").textContent = msg.subject || "(No subject)";
  document.getElementById("modalFrom").textContent = "From: " + (msg.from?.address || "");
  document.getElementById("modalBody").innerHTML = msg.html?.[0] || msg.text || "(No content)";
  document.getElementById("modal").classList.add("show");
}

document.getElementById("closeModal").onclick = () => {
  document.getElementById("modal").classList.remove("show");
};

document.getElementById("copyBtn").onclick = () => {
  const addr = document.getElementById("emailAddr").textContent;
  navigator.clipboard.writeText(addr);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "Copied!";
  setTimeout(()=> btn.textContent = "Copy", 1500);
};

document.getElementById("newBtn").onclick = createEmail;

createEmail();
</script>

</body>
</html>
